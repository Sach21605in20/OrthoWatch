spring:
  application:
    name: orthowatch-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/orthowatch}
    username: ${SPRING_DATASOURCE_USERNAME:orthowatch_user}
    password: ${SPRING_DATASOURCE_PASSWORD:orthowatch_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.orthowatch: DEBUG
    org.springframework.web: INFO

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    refresh-secret: ${APP_JWT_REFRESH_SECRET}
    expiration: ${APP_JWT_EXPIRATION}
    refresh-expiration: ${APP_JWT_REFRESH_EXPIRATION}
  storage:
    provider: ${APP_STORAGE_PROVIDER:LOCAL}
    local-path: ${APP_STORAGE_LOCAL_PATH:./uploads/wound-images}
    max-file-size: ${APP_STORAGE_MAX_FILE_SIZE:10485760}
  whatsapp:
    api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v18.0}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:}
